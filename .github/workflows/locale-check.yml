name: Locale Check

on:
  pull_request:
    paths:
      - "frontend/locales/*.json"
      - "tools/check_locales.py"
      - "tools/generate_locale_manifest.py"
      - ".github/workflows/locale-check.yml"
  push:
    branches: [main]
    paths:
      - "frontend/locales/*.json"
      - "tools/check_locales.py"
      - "tools/generate_locale_manifest.py"
      - ".github/workflows/locale-check.yml"

permissions:
  contents: read

concurrency:
  group: locale-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-manifest:
    name: Synchronize locale manifest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}

      - name: Regenerate locale manifest
        run: python3 tools/generate_locale_manifest.py

      - name: Run locale validator
        run: python3 tools/check_locales.py

      - name: Commit manifest when changed
        run: |
          if git diff --quiet -- frontend/locales/manifest.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/locales/manifest.json
          git commit -m "chore(locales): regenerate manifest"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git push origin "HEAD:${{ github.head_ref }}"
          else
            git push
          fi

  validate-fork:
    name: Validate locale manifest from fork
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Regenerate locale manifest
        run: python3 tools/generate_locale_manifest.py

      - name: Require the generated manifest in the pull request
        run: |
          if ! git diff --quiet -- frontend/locales/manifest.json; then
            echo "::error file=frontend/locales/manifest.json::Locale manifest is stale. Run 'python3 tools/generate_locale_manifest.py' and commit the result."
            git diff -- frontend/locales/manifest.json
            exit 1
          fi

      - name: Run locale validator
        run: python3 tools/check_locales.py
