name: Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  versioning:
    name: Version resolution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test official and nightly release identity
        run: |
          python3 tools/test_resolve_build_version.py
          python3 tools/test_resolve_release_identity.py

  host:
    name: Host build and tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux host dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential make python3 ccache

      - name: Setup ccache (host)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-host-ccache-${{ github.sha }}
          restore-keys: ${{ runner.os }}-host-ccache-
          max-size: 200M

      - name: Build host payload
        run: make clean host HOST_CC="ccache cc"

      - name: Run host tests
        run: make test

  locales:
    name: Locale validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate locale files
        run: |
          python3 tools/generate_locale_manifest.py
          make check-locales

  headers:
    name: Header-source validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify header-source correspondence
        run: python3 tools/check_headers.py

  frontend:
    name: Frontend build and tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux frontend dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcursor-dev \
            libxext-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            make \
            ninja-build \
            pkg-config \
            python3 \
            wayland-protocols \
            xxd

      - name: Install macOS frontend dependencies
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          brew update
          brew install cmake ninja pkg-config

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: ${{ runner.os }}-ccache-
          max-size: 400M

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/frontend/_deps
          key: ${{ runner.os }}-deps-${{ hashFiles('frontend/CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-deps-

      - name: Configure frontend
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cmake -S frontend -B build/frontend -DCMAKE_BUILD_TYPE=Release
          else
            cmake -S frontend -B build/frontend -G Ninja -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build frontend and test binaries
        shell: bash
        run: cmake --build build/frontend --config Release

      - name: Run frontend tests
        shell: bash
        run: |
          set -euo pipefail

          run_frontend_test() {
            local name="$1"

            local paths=()
            while IFS= read -r p; do
              paths+=("$p")
            done < <(find build/frontend -type f \( -name "$name" -o -name "$name.exe" \) 2>/dev/null || true)

            if [ ${#paths[@]} -eq 0 ]; then
              echo "Could not find frontend test binary: $name" >&2
              find build/frontend -maxdepth 5 -type f 2>/dev/null | sort || true
              exit 1
            fi

            local exe="${paths[0]}"
            if [ ${#paths[@]} -gt 1 ]; then
              echo "==> Warning: multiple candidates for $name, using $exe" >&2
              printf '    %s\n' "${paths[@]}" >&2
            fi

            echo "==> $name: $exe"
            ls -la "$exe" || true
            if command -v file &>/dev/null; then
              file "$exe" || true
            fi

            if [[ "$OSTYPE" != msys* && "$OSTYPE" != cygwin* ]]; then
              if ! [ -x "$exe" ]; then
                echo "==> ERROR: $exe is NOT executable" >&2
                exit 1
              fi
            fi

            if [[ "$OSTYPE" == linux-gnu* ]] && command -v ldd &>/dev/null; then
              ldd "$exe" || true
            elif [[ "$OSTYPE" == darwin* ]] && command -v otool &>/dev/null; then
              otool -L "$exe" || true
            elif [[ "$OSTYPE" == msys* || "$OSTYPE" == cygwin* ]]; then
              echo "==> DLL dependencies:"
              objdump -p "$exe" 2>/dev/null | grep -i 'DLL Name' || echo "    (objdump not available)"
            fi

            echo "==> Running $exe..."
            "$exe" || {
              rc=$?
              echo "==> $name exited with code $rc" >&2
              if [[ "$OSTYPE" == msys* || "$OSTYPE" == cygwin* ]] && [ "$rc" -eq 127 ]; then
                echo "==> Hint: exit 127 on Windows often means a required DLL is missing." >&2
                echo "==> Try running: dumpbin /dependents $exe" >&2
              fi
              exit "$rc"
            }
          }

          run_frontend_test memdbg_auto_search_test
          run_frontend_test memdbg_structure_compare_test
          run_frontend_test memdbg_app_state_parsing_test
          run_frontend_test memdbg_payload_sender_test
          run_frontend_test memdbg_release_check_test
          run_frontend_test memdbg_client_test
          run_frontend_test memdbg_trainer_formats_test
          run_frontend_test memdbg_locale_manager_test
          run_frontend_test memdbg_plugin_manager_test

          run_frontend_test memdbg_sandbox_lua_test
          run_frontend_test memdbg_sandbox_fuzz_test
          run_frontend_test memdbg_sandbox_limits_test
          run_frontend_test memdbg_sandbox_hardened_test
          run_frontend_test memdbg_sandbox_python_test

  payload:
    name: Payload compile (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ps4
            sdk: external/ps4-payload-sdk
            compiler: bin/orbis-clang
            archive: bin/orbis-ar
            targets: payload-ps4 payload-ps4-lib
          - platform: ps5
            sdk: external/ps5-payload-sdk
            compiler: bin/prospero-clang
            archive: bin/prospero-ar
            targets: payload-ps5 payload-ps5-lib

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure submodules (nested Zydis/Zycore)
        run: git submodule update --init --recursive

      - name: Install payload build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential clang lld llvm make

      - name: Validate vendored SDK
        run: |
          set -euo pipefail
          test -x "${{ matrix.sdk }}/${{ matrix.compiler }}"
          test -x "${{ matrix.sdk }}/${{ matrix.archive }}"

      - name: Build payload
        run: make clean ${{ matrix.targets }}

  sanitizers:
    name: Sanitizer builds (ASan + UBSan + TSan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential make python3

      - name: Build with AddressSanitizer
        run: |
          set -euo pipefail
          export SAN_CC=clang
          export SAN_CPPFLAGS="-Ibuild/generated/include -Iinclude -Isrc/core/daemon -D_DARWIN_C_SOURCE -D_POSIX_C_SOURCE=200809L"
          export SAN_CFLAGS="-std=c11 -Wall -Wextra -Wpedantic -fstack-protector-strong -O1 -g -fsanitize=address -fno-omit-frame-pointer"
          export SAN_LDFLAGS="-fsanitize=address"
          make clean
          make host HOST_CC="$SAN_CC" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_CFLAGS="$SAN_CFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"

      - name: Run ASan tests
        run: |
          set -euo pipefail
          export ASAN_OPTIONS=detect_leaks=1:halt_on_error=1:abort_on_error=1
          export SAN_CC=clang
          export SAN_CPPFLAGS="-Ibuild/generated/include -Iinclude -Isrc/core/daemon -D_DARWIN_C_SOURCE -D_POSIX_C_SOURCE=200809L"
          export SAN_CFLAGS="-std=c11 -Wall -Wextra -Wpedantic -fstack-protector-strong -O1 -g -fsanitize=address -fno-omit-frame-pointer"
          export SAN_LDFLAGS="-fsanitize=address"
          make test-sjson HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"
          make test-memory HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"
          make test-thread-pool HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"
          make test-lz4 HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"
          make test-scan-partition HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"
          make test-debugger-e2e HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS" || echo "::warning::ASan E2E test exited non-zero"
          # Run the fuzz corpus under ASan — catches memory errors in the MDBG
          # protocol header, LZ4, sJSON, and process maps response parsers.
          make fuzz-corpus HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"

      - name: Build with UndefinedBehaviorSanitizer
        run: |
          set -euo pipefail
          export SAN_CC=clang
          export SAN_CPPFLAGS="-Ibuild/generated/include -Iinclude -Isrc/core/daemon -D_DARWIN_C_SOURCE -D_POSIX_C_SOURCE=200809L"
          export SAN_CFLAGS="-std=c11 -Wall -Wextra -Wpedantic -fstack-protector-strong -O1 -g -fsanitize=undefined -fno-sanitize-recover=all"
          export SAN_LDFLAGS="-fsanitize=undefined"
          make clean
          make host HOST_CC="$SAN_CC" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_CFLAGS="$SAN_CFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"

      - name: Run UBSan tests
        run: |
          set -euo pipefail
          export UBSAN_OPTIONS=halt_on_error=1:abort_on_error=1:print_stacktrace=1
          export SAN_CC=clang
          export SAN_CPPFLAGS="-Ibuild/generated/include -Iinclude -Isrc/core/daemon -D_DARWIN_C_SOURCE -D_POSIX_C_SOURCE=200809L"
          export SAN_CFLAGS="-std=c11 -Wall -Wextra -Wpedantic -fstack-protector-strong -O1 -g -fsanitize=undefined -fno-sanitize-recover=all"
          export SAN_LDFLAGS="-fsanitize=undefined"
          make test-sjson HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"
          make test-memory HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"
          make test-thread-pool HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"
          make test-lz4 HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"
          make test-scan-partition HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"
          make test-debugger-e2e HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS" || echo "::warning::UBSan E2E test exited non-zero"
          # Run the fuzz corpus under UBSan — catches undefined behaviour in
          # the MDBG protocol header, LZ4, sJSON, and process maps parsers.
          make fuzz-corpus HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"

      - name: Build with ThreadSanitizer
        run: |
          set -euo pipefail
          export SAN_CC=clang
          export SAN_CPPFLAGS="-Ibuild/generated/include -Iinclude -Isrc/core/daemon -D_DARWIN_C_SOURCE -D_POSIX_C_SOURCE=200809L"
          export SAN_CFLAGS="-std=c11 -Wall -Wextra -Wpedantic -fstack-protector-strong -O1 -g -fsanitize=thread"
          export SAN_LDFLAGS="-fsanitize=thread"
          make clean
          make host HOST_CC="$SAN_CC" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_CFLAGS="$SAN_CFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"

      - name: Run TSan tests
        run: |
          set -euo pipefail
          export TSAN_OPTIONS=halt_on_error=1:abort_on_error=1:history_size=7
          export SAN_CC=clang
          export SAN_CPPFLAGS="-Ibuild/generated/include -Iinclude -Isrc/core/daemon -D_DARWIN_C_SOURCE -D_POSIX_C_SOURCE=200809L"
          export SAN_CFLAGS="-std=c11 -Wall -Wextra -Wpedantic -fstack-protector-strong -O1 -g -fsanitize=thread"
          export SAN_LDFLAGS="-fsanitize=thread"
          make test-sjson HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"
          make test-memory HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"
          make test-thread-pool HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"
          make test-scan-partition HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"
          make test-debugger-e2e HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS" || echo "::warning::TSan E2E test exited non-zero"
          # Run the fuzz corpus under TSan — catches data races in the MDBG
          # protocol header, LZ4, sJSON, and process maps parsers.
          make fuzz-corpus HOST_CC="$SAN_CC" HOST_CFLAGS="$SAN_CFLAGS" HOST_CPPFLAGS="$SAN_CPPFLAGS" HOST_LDFLAGS="$SAN_LDFLAGS"

  msvc:
    name: MSVC compilation check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/frontend/_deps
          key: msvc-deps-${{ hashFiles('frontend/CMakeLists.txt') }}
          restore-keys: msvc-deps-

      - name: Configure frontend with MSVC
        shell: bash
        run: cmake -S frontend -B build/frontend -DCMAKE_BUILD_TYPE=Release

      - name: Build client test target (memdbg_client.cpp, platform.cpp, lz4.c)
        shell: bash
        run: |
          # Build the smallest test target that exercises the core client code.
          # memdbg_client_test compiles memdbg_client.cpp, client_pool.cpp,
          # protocol_broker.cpp, platform.cpp, and lz4.c — the exact files
          # that previously failed with MSVC setsockopt type errors.
          cmake --build build/frontend --config Release --target memdbg_client_test

      - name: Build supplementary test targets
        shell: bash
        run: |
          # Build additional targets to catch MSVC issues in other shared files.
          # These are small standalone/test executables (no GUI dependencies).
          cmake --build build/frontend --config Release --target memdbg_action_journal_test
          cmake --build build/frontend --config Release --target memdbg_locale_manager_test
          cmake --build build/frontend --config Release --target memdbg_payload_sender_test
          cmake --build build/frontend --config Release --target memdbg_release_check_test
          cmake --build build/frontend --config Release --target memdbg_structure_compare_test
          # memdbg_app_reconnect_test exercises memdbg_client.cpp with a richer
          # include path and links against Lua — different translation-unit
          # exposure that surfaces additional MSVC issues.
          cmake --build build/frontend --config Release --target memdbg_app_reconnect_test

      - name: Build probe executables
        shell: bash
        run: |
          # memdbg_probe and memdbg_performance_probe compile memdbg_client.cpp
          # with different include paths — good coverage.
          cmake --build build/frontend --config Release --target memdbg_probe
          cmake --build build/frontend --config Release --target memdbg_performance_probe

      - name: Verify /WX flag propagation
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Checking /WX in generated MSBuild project files ==="
          matches=$(find build/frontend -name '*.vcxproj' -exec grep -l '/WX' {} + 2>/dev/null | sort -u || true)
          if [ -n "$matches" ]; then
            echo "$matches"
            count=$(echo "$matches" | wc -l)
            echo "Found /WX in $count project file(s)"
            echo "=== Checking test targets specifically ==="
            test_matches=$(find build/frontend -name '*memdbg_*_test.vcxproj' -exec grep -l '/WX' {} + 2>/dev/null || true)
            all_tests=$(find build/frontend -name '*memdbg_*_test.vcxproj' 2>/dev/null | sort -u || true)
            if [ -n "$all_tests" ]; then
              test_count=$(echo "$all_tests" | wc -l)
              wx_test_count=$(echo "$test_matches" | wc -l)
              echo "$wx_test_count of $test_count test project files contain /WX"
              if [ "$wx_test_count" -lt "$test_count" ]; then
                echo "::warning::Not all test targets have /WX. Missing targets:"
                for f in $all_tests; do
                  if ! grep -q '/WX' "$f" 2>/dev/null; then
                    echo "  MISSING: $(basename "$f")"
                  fi
                done
              fi
            fi
          else
            echo "::warning::No /WX found in any vcxproj file — check CMakeLists.txt MSVC config"
          fi

  static-analysis:
    name: Static analysis (clang-tidy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential clang clang-tidy make python3

      - name: Generate compile_commands.json
        run: |
          make clean
          sudo apt-get install -y bear
          bear -- make host || true

      - name: Run clang-tidy
        run: |
          if [ -f compile_commands.json ]; then
            find src -name '*.c' -print0 | xargs -0 clang-tidy -p . 2>&1 | head -200 || echo "::warning::clang-tidy found warnings"
          else
            echo "::warning::compile_commands.json not found, skipping clang-tidy"
          fi
