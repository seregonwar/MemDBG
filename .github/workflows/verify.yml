name: Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host:
    name: Host build and tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux host dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential make python3

      - name: Build host payload
        run: make clean host

      - name: Run host tests
        run: make test

  locales:
    name: Locale validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate locale files
        run: make check-locales

  frontend:
    name: Frontend build and tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux frontend dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcursor-dev \
            libxext-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            make \
            ninja-build \
            pkg-config \
            python3 \
            wayland-protocols \
            xxd

      - name: Install macOS frontend dependencies
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          brew update
          brew install cmake ninja pkg-config

      - name: Configure frontend
        shell: bash
        run: cmake -S frontend -B build/frontend -DCMAKE_BUILD_TYPE=Release

      - name: Build frontend and test binaries
        shell: bash
        run: cmake --build build/frontend --config Release --parallel 4

      - name: Run frontend tests
        shell: bash
        run: |
          set -euo pipefail

          run_frontend_test() {
            local name="$1"
            local exe
            exe=$(find build/frontend -type f \( -name "$name" -o -name "$name.exe" \) | head -n 1)
            if [ -z "$exe" ]; then
              echo "Could not find frontend test binary: $name" >&2
              find build/frontend -maxdepth 5 -type f | sort
              exit 1
            fi
            "$exe"
          }

          run_frontend_test memdbg_auto_search_test
          run_frontend_test memdbg_app_state_parsing_test
          run_frontend_test memdbg_trainer_formats_test
          run_frontend_test memdbg_locale_manager_test

  payload:
    name: Payload compile (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ps4
            sdk: external/ps4-payload-sdk
            compiler: bin/orbis-clang
            archive: bin/orbis-ar
            targets: payload-ps4 payload-ps4-lib
          - platform: ps5
            sdk: external/ps5-payload-sdk
            compiler: bin/prospero-clang
            archive: bin/prospero-ar
            targets: payload-ps5 payload-ps5-lib

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install payload build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential clang lld llvm make

      - name: Validate vendored SDK
        run: |
          set -euo pipefail
          test -x "${{ matrix.sdk }}/${{ matrix.compiler }}"
          test -x "${{ matrix.sdk }}/${{ matrix.archive }}"

      - name: Build payload
        run: make clean ${{ matrix.targets }}
