name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.2.0 or v0.2.0"
        required: true
        type: string
      draft:
        description: "Create the GitHub release as draft"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark the GitHub release as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: host-linux
            os: ubuntu-latest
            kind: host
            platform: linux
            artifact: MemDBG-host-linux
          - name: frontend-linux
            os: ubuntu-latest
            kind: frontend
            platform: linux
            artifact: MemDBG-frontend-linux
          - name: host-macos
            os: macos-latest
            kind: host
            platform: macos
            artifact: MemDBG-host-macos
          - name: frontend-macos
            os: macos-latest
            kind: frontend
            platform: macos
            artifact: MemDBG-frontend-macos
          - name: frontend-windows
            os: windows-latest
            kind: frontend
            platform: windows
            artifact: MemDBG-frontend-windows
          - name: payload-ps4
            os: ubuntu-latest
            kind: ps4
            platform: ps4
            artifact: MemDBG-payload-ps4
          - name: payload-ps5
            os: ubuntu-latest
            kind: ps5
            platform: ps5
            artifact: MemDBG-payload-ps5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Resolve build version
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n '1{s/^[[:space:]]*//;s/[[:space:]]*$//;p;q;}' VERSION)"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          fi
          version="${version#v}"
          version="${version#V}"
          if [[ ! "${version}" =~ ^[0-9]+(\.[0-9]+){1,3}([.-][0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid MemDBG version: ${version}" >&2
            exit 1
          fi
          printf '%s\n' "${version}" > VERSION
          echo "MEMDBG_RELEASE_VERSION=${version}" >> "$GITHUB_ENV"
          echo "MemDBG build version: ${version}"

      - name: Validate locale files
        if: matrix.kind == 'host' && matrix.platform == 'linux'
        run: python3 tools/check_locales.py

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            git \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcursor-dev \
            libxext-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            lld \
            llvm \
            make \
            ninja-build \
            pkg-config \
            python3 \
            wayland-protocols \
            xxd

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          brew update
          brew install cmake llvm ninja pkg-config
          if [ -d /opt/homebrew/opt/llvm/bin ]; then
            echo "/opt/homebrew/opt/llvm/bin" >> "$GITHUB_PATH"
          fi
          if [ -d /usr/local/opt/llvm/bin ]; then
            echo "/usr/local/opt/llvm/bin" >> "$GITHUB_PATH"
          fi

      - name: Validate vendored PS4 SDK
        if: matrix.kind == 'ps4'
        run: |
          set -euo pipefail
          sdk="$GITHUB_WORKSPACE/external/ps4-payload-sdk"
          test -f "$sdk/toolchain/orbis.mk"
          test -x "$sdk/bin/orbis-clang"
          test -x "$sdk/bin/orbis-ar"
          echo "PS4_PAYLOAD_SDK=$sdk" >> "$GITHUB_ENV"

      - name: Validate vendored PS5 SDK
        if: matrix.kind == 'ps5'
        run: |
          set -euo pipefail
          sdk="$GITHUB_WORKSPACE/external/ps5-payload-sdk"
          test -f "$sdk/toolchain/prospero.mk"
          test -x "$sdk/bin/prospero-clang"
          test -x "$sdk/bin/prospero-ar"
          echo "PS5_PAYLOAD_SDK=$sdk" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.kind }}" in
            host)
              make clean host MEMDBG_VERSION="${MEMDBG_RELEASE_VERSION}"
              if [ "${{ runner.os }}" = "Linux" ]; then
                make test MEMDBG_VERSION="${MEMDBG_RELEASE_VERSION}"
              fi
              ;;
            frontend)
              if [ "${{ runner.os }}" = "Windows" ]; then
                cmake -S frontend -B build/frontend -DMEMDBG_RELEASE_VERSION="${MEMDBG_RELEASE_VERSION}"
                cmake --build build/frontend --config Release --parallel 4
              else
                make clean frontend MEMDBG_VERSION="${MEMDBG_RELEASE_VERSION}"
              fi
              ;;
            ps4)
              make clean payload-ps4 payload-ps4-lib \
                MEMDBG_VERSION="${MEMDBG_RELEASE_VERSION}" \
                PS4_PAYLOAD_SDK="$PS4_PAYLOAD_SDK"
              ;;
            ps5)
              make clean payload-ps5 payload-ps5-lib \
                MEMDBG_VERSION="${MEMDBG_RELEASE_VERSION}" \
                PS5_PAYLOAD_SDK="$PS5_PAYLOAD_SDK"
              ;;
            *)
              echo "Unknown build kind: ${{ matrix.kind }}" >&2
              exit 1
              ;;
          esac

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          case "${{ matrix.kind }}" in
            host)
              pkg="MemDBG-host-${{ matrix.platform }}"
              mkdir -p "dist/$pkg"
              cp build/MemDBG-host "dist/$pkg/MemDBG-host"
              chmod +x "dist/$pkg/MemDBG-host"
              cat > "dist/$pkg/BUILD_INFO.txt" <<EOF
          project=MemDBG
          version=${MEMDBG_RELEASE_VERSION}
          component=host
          platform=${{ matrix.platform }}
          ref=${{ github.ref_name }}
          sha=${{ github.sha }}
          EOF
              tar -C dist -czf "dist/$pkg.tar.gz" "$pkg"
              rm -rf "dist/$pkg"
              ;;
            frontend)
              pkg="MemDBG-frontend-${{ matrix.platform }}"

              if [ "${{ matrix.platform }}" = "macos" ]; then
                app_bundle=$(find build/frontend -type d -name 'MemDBG.app' -print -quit)
                if [ -z "$app_bundle" ]; then
                  echo "MemDBG.app bundle not found" >&2
                  find build/frontend -maxdepth 6 -print | sort
                  exit 1
                fi

                mkdir -p "dist/$pkg"
                cp -R "$app_bundle" "dist/$pkg/MemDBG.app"
                chmod +x "dist/$pkg/MemDBG.app/Contents/MacOS/"*
                cat > "dist/$pkg/MemDBG.app/Contents/Resources/BUILD_INFO.txt" <<EOF
          project=MemDBG
          version=${MEMDBG_RELEASE_VERSION}
          component=frontend
          platform=${{ matrix.platform }}
          ref=${{ github.ref_name }}
          sha=${{ github.sha }}
          EOF
                (cd "dist/$pkg" && ditto -c -k --sequesterRsrc --keepParent "MemDBG.app" "../$pkg.app.zip")
                ln -s /Applications "dist/$pkg/Applications"
                hdiutil create \
                  -volname "MemDBG ${MEMDBG_RELEASE_VERSION}" \
                  -srcfolder "dist/$pkg" \
                  -ov \
                  -format UDZO \
                  "dist/$pkg.dmg"
                rm -f "dist/$pkg/Applications"
                rm -rf "dist/$pkg"
              else
                mkdir -p "dist/$pkg/assets"
                frontend_bin=$(find build/frontend -type f \( -name 'memdbg_frontend' -o -name 'memdbg_frontend.exe' \) | head -n 1)
                probe_bin=$(find build/frontend -type f \( -name 'memdbg_probe' -o -name 'memdbg_probe.exe' \) | head -n 1)
                if [ -z "$frontend_bin" ] || [ -z "$probe_bin" ]; then
                  echo "Frontend binaries not found" >&2
                  find build/frontend -maxdepth 4 -type f | sort
                  exit 1
                fi
                cp "$frontend_bin" "dist/$pkg/"
                cp "$probe_bin" "dist/$pkg/"
                chmod +x "dist/$pkg/$(basename "$frontend_bin")" "dist/$pkg/$(basename "$probe_bin")"
                cp assets/app-icon.png "dist/$pkg/assets/app-icon.png"
                plugin_repo="$(dirname "$frontend_bin")/plugin-repository"
                if [ -d "$plugin_repo" ]; then
                  cp -R "$plugin_repo" "dist/$pkg/plugin-repository"
                elif [ -d plugin-repository ]; then
                  cp -R plugin-repository "dist/$pkg/plugin-repository"
                fi
                if [ "${{ matrix.platform }}" = "windows" ]; then
                  cp assets/app-icon.ico "dist/$pkg/assets/app-icon.ico"
                fi
                if [ "${{ matrix.platform }}" = "linux" ]; then
                  mkdir -p "dist/$pkg/share/applications" "dist/$pkg/share/icons/hicolor/1024x1024/apps"
                  cp assets/app-icon.png "dist/$pkg/share/icons/hicolor/1024x1024/apps/app-icon.png"
                  if [ -f "$(dirname "$frontend_bin")/MemDBG.desktop" ]; then
                    cp "$(dirname "$frontend_bin")/MemDBG.desktop" "dist/$pkg/share/applications/MemDBG.desktop"
                  else
                    cat > "dist/$pkg/share/applications/MemDBG.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=MemDBG
          Comment=Native memory debugger frontend
          Exec=memdbg_frontend
          Icon=app-icon
          Terminal=false
          Categories=Development;Debugger;
          EOF
                  fi
                fi
                cat > "dist/$pkg/BUILD_INFO.txt" <<EOF
          project=MemDBG
          version=${MEMDBG_RELEASE_VERSION}
          component=frontend
          platform=${{ matrix.platform }}
          ref=${{ github.ref_name }}
          sha=${{ github.sha }}
          EOF
                if [ "${{ matrix.platform }}" = "windows" ]; then
                  python3 -c "import shutil; shutil.make_archive('dist/$pkg', 'zip', 'dist', '$pkg')"
                else
                  tar -C dist -czf "dist/$pkg.tar.gz" "$pkg"
                fi
                rm -rf "dist/$pkg"
              fi
              ;;
            ps4)
              cp build/ps4/MemDBG-ps4.elf dist/MemDBG-ps4.elf
              cp build/ps4/libmemdbg.a dist/libmemdbg-ps4.a
              ;;
            ps5)
              cp build/ps5/MemDBG-ps5.elf dist/MemDBG-ps5.elf
              cp build/ps5/libmemdbg.a dist/libmemdbg-ps5.a
              ;;
          esac

          ls -lh dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  mobile-ios:
    name: Mobile iOS/iPadOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect iOS project
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [ -d mobile/ios/MemDBG.xcworkspace ]; then
            echo "enabled=workspace" >> "$GITHUB_OUTPUT"
          elif [ -d mobile/ios/MemDBG.xcodeproj ]; then
            echo "enabled=project" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=none" >> "$GITHUB_OUTPUT"
            echo "iOS project not present yet; see mobile/ios/README.md"
          fi

      - name: Build unsigned IPA
        if: steps.detect.outputs.enabled != 'none'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/ios dist
          if [ "${{ steps.detect.outputs.enabled }}" = "workspace" ]; then
            xcodebuild \
              -workspace mobile/ios/MemDBG.xcworkspace \
              -scheme MemDBGMobile \
              -configuration Release \
              -sdk iphoneos \
              -archivePath build/ios/MemDBG.xcarchive \
              CODE_SIGNING_ALLOWED=NO \
              archive
          else
            xcodebuild \
              -project mobile/ios/MemDBG.xcodeproj \
              -scheme MemDBGMobile \
              -configuration Release \
              -sdk iphoneos \
              -archivePath build/ios/MemDBG.xcarchive \
              CODE_SIGNING_ALLOWED=NO \
              archive
          fi
          app_path=$(find build/ios/MemDBG.xcarchive/Products/Applications -maxdepth 1 -type d -name '*.app' -print -quit)
          if [ -z "$app_path" ]; then
            echo "Archived iOS app not found" >&2
            find build/ios -maxdepth 6 -print | sort
            exit 1
          fi
          mkdir -p build/ios/Payload
          cp -R "$app_path" build/ios/Payload/MemDBG.app
          (cd build/ios && zip -qry "../../dist/MemDBG-mobile-ios.ipa" Payload)

      - name: Upload iOS artifact
        if: steps.detect.outputs.enabled != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: MemDBG-mobile-ios
          path: dist/*.ipa
          if-no-files-found: error
          retention-days: 14

  mobile-android:
    name: Mobile Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect Android project
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [ -x mobile/android/gradlew ]; then
            echo "enabled=1" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=0" >> "$GITHUB_OUTPUT"
            echo "Android Gradle project not present yet; see mobile/android/README.md"
          fi

      - name: Set up JDK
        if: steps.detect.outputs.enabled == '1'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        if: steps.detect.outputs.enabled == '1'
        uses: android-actions/setup-android@v3

      - name: Build release APK
        if: steps.detect.outputs.enabled == '1'
        shell: bash
        run: |
          set -euo pipefail
          cd mobile/android
          ./gradlew --no-daemon assembleRelease
          cd ../..
          mkdir -p dist
          find mobile/android -type f -path '*/build/outputs/apk/release/*.apk' \
            -exec cp {} dist/ \;

      - name: Upload Android artifact
        if: steps.detect.outputs.enabled == '1'
        uses: actions/upload-artifact@v4
        with:
          name: MemDBG-mobile-android
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - mobile-ios
      - mobile-android
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find release-artifacts -type f \( \
            -name '*.tar.gz' -o \
            -name '*.zip' -o \
            -name '*.dmg' -o \
            -name '*.ipa' -o \
            -name '*.apk' -o \
            -name '*.aab' -o \
            -name '*.AppImage' -o \
            -name '*.elf' -o \
            -name '*.a' \
          \) \
            -exec cp {} release-assets/ \;
          cd release-assets
          shopt -s nullglob
          assets=( *.tar.gz *.zip *.dmg *.ipa *.apk *.aab *.AppImage *.elf *.a )
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found" >&2
            exit 1
          fi
          sha256sum "${assets[@]}" > SHA256SUMS.txt
          ls -lh

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DRAFT: ${{ inputs.draft }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${INPUT_VERSION}"
            if [ -z "${version}" ]; then
              echo "Release version is required" >&2
              exit 1
            fi
            if [[ "${version}" == v* ]]; then
              tag="${version}"
            else
              tag="v${version}"
            fi
            if [[ ! "${tag}" =~ ^v[0-9]+(\.[0-9]+){1,3}([.-][0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
              echo "Invalid release version: ${INPUT_VERSION}" >&2
              echo "Use a version like 0.2.0, 1.2.3-beta.1, or v1.2.3" >&2
              exit 1
            fi
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              git tag "${tag}" "${GITHUB_SHA}"
              git push origin "refs/tags/${tag}"
            fi
          fi

          flags=(--title "MemDBG ${tag}" --generate-notes)
          if [ "${INPUT_DRAFT:-false}" = "true" ]; then
            flags+=(--draft)
          fi
          if [ "${INPUT_PRERELEASE:-false}" = "true" ]; then
            flags+=(--prerelease)
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" release-assets/* --clobber
          else
            gh release create "${tag}" release-assets/* "${flags[@]}"
          fi
