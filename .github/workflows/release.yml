name: Release

on:
  push:
    tags:
      - "v*"
  schedule:
    # GitHub cron is UTC. Preflight selects exactly one entry for 22:00 Rome.
    - cron: "0 20 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.2.0 or v0.2.0"
        required: false
        type: string
      nightly:
        description: "Build an immutable historical nightly release"
        required: false
        default: false
        type: boolean
      draft:
        description: "Create the GitHub release as draft"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark the GitHub release as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  preflight:
    name: Resolve release identity
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.identity.outputs.should_run }}
      nightly: ${{ steps.identity.outputs.nightly }}
      version: ${{ steps.identity.outputs.version }}
      tag: ${{ steps.identity.outputs.tag }}
      title: ${{ steps.identity.outputs.title }}
      stable: ${{ steps.identity.outputs.stable }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release identity and Rome schedule
        id: identity
        shell: bash
        run: |
          set -euo pipefail
          args=(
            identity
            --event "${GITHUB_EVENT_NAME}"
            --ref-type "${GITHUB_REF_TYPE}"
            --ref-name "${GITHUB_REF_NAME}"
            --input-version "${{ inputs.version }}"
            --run-number "${GITHUB_RUN_NUMBER}"
            --sha "${GITHUB_SHA}"
            --short-sha "$(git rev-parse --short=7 "${GITHUB_SHA}")"
            --now "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            --schedule "${{ github.event.schedule }}"
          )
          if [ "${{ github.event_name == 'schedule' || inputs.nightly == true }}" = "true" ]; then
            args+=(--nightly)
          fi
          python3 tools/resolve_release_identity.py "${args[@]}" |
            tee -a "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.name }}
    needs: preflight
    if: needs.preflight.outputs.should_run == 'true'
    runs-on: ${{ matrix.os }}
    env:
      MEMDBG_RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: host-linux
            os: ubuntu-latest
            kind: host
            platform: linux
            artifact: MemDBG-host-linux
          - name: frontend-linux
            os: ubuntu-latest
            kind: frontend
            platform: linux
            artifact: MemDBG-frontend-linux
          - name: host-macos
            os: macos-latest
            kind: host
            platform: macos
            artifact: MemDBG-host-macos
          - name: frontend-macos
            os: macos-latest
            kind: frontend
            platform: macos
            artifact: MemDBG-frontend-macos
          - name: frontend-windows
            os: windows-latest
            kind: frontend
            platform: windows
            artifact: MemDBG-frontend-windows
          - name: payload-ps4
            os: ubuntu-latest
            kind: ps4
            platform: ps4
            artifact: MemDBG-payload-ps4
          - name: payload-ps5
            os: ubuntu-latest
            kind: ps5
            platform: ps5
            artifact: MemDBG-payload-ps5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Resolve build version
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "${MEMDBG_RELEASE_VERSION}" > VERSION
          echo "MemDBG build version: ${MEMDBG_RELEASE_VERSION}"

      - name: Validate locale files
        if: matrix.kind == 'host' && matrix.platform == 'linux'
        run: python3 tools/check_locales.py

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            git \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcursor-dev \
            libxext-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            lld \
            llvm \
            make \
            ninja-build \
            pkg-config \
            python3 \
            wayland-protocols \
            xxd

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          brew update
          brew install cmake llvm ninja pkg-config
          if [ -d /opt/homebrew/opt/llvm/bin ]; then
            echo "/opt/homebrew/opt/llvm/bin" >> "$GITHUB_PATH"
          fi
          if [ -d /usr/local/opt/llvm/bin ]; then
            echo "/usr/local/opt/llvm/bin" >> "$GITHUB_PATH"
          fi

      - name: Setup ccache
        if: matrix.kind == 'host' || matrix.kind == 'frontend'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-${{ matrix.kind }}-ccache-${{ github.sha }}
          restore-keys: ${{ runner.os }}-${{ matrix.kind }}-ccache-
          max-size: 400M

      - name: Cache FetchContent dependencies
        if: matrix.kind == 'frontend'
        uses: actions/cache@v4
        with:
          path: build/frontend/_deps
          key: ${{ runner.os }}-deps-${{ hashFiles('frontend/CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-deps-

      - name: Validate vendored PS4 SDK
        if: matrix.kind == 'ps4'
        run: |
          set -euo pipefail
          sdk="$GITHUB_WORKSPACE/external/ps4-payload-sdk"
          test -f "$sdk/toolchain/orbis.mk"
          test -x "$sdk/bin/orbis-clang"
          test -x "$sdk/bin/orbis-ar"
          echo "PS4_PAYLOAD_SDK=$sdk" >> "$GITHUB_ENV"

      - name: Validate vendored PS5 SDK
        if: matrix.kind == 'ps5'
        run: |
          set -euo pipefail
          sdk="$GITHUB_WORKSPACE/external/ps5-payload-sdk"
          test -f "$sdk/toolchain/prospero.mk"
          test -x "$sdk/bin/prospero-clang"
          test -x "$sdk/bin/prospero-ar"
          echo "PS5_PAYLOAD_SDK=$sdk" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.kind }}" in
            host)
              make clean host MEMDBG_VERSION="${MEMDBG_RELEASE_VERSION}" \
                HOST_CC="ccache cc"
              if [ "${{ runner.os }}" = "Linux" ]; then
                make test MEMDBG_VERSION="${MEMDBG_RELEASE_VERSION}" \
                  HOST_CC="ccache cc"
              fi
              ;;
            frontend)
              rm -rf build
              if [ "${{ runner.os }}" = "Windows" ]; then
                cmake -S frontend -B build/frontend \
                  -DMEMDBG_RELEASE_VERSION="${MEMDBG_RELEASE_VERSION}"
                cmake --build build/frontend --config Release
              else
                cmake -S frontend -B build/frontend -G Ninja \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DMEMDBG_RELEASE_VERSION="${MEMDBG_RELEASE_VERSION}"
                cmake --build build/frontend --config Release
              fi
              ;;
            ps4)
              make clean payload-ps4 payload-ps4-lib \
                MEMDBG_VERSION="${MEMDBG_RELEASE_VERSION}" \
                PS4_PAYLOAD_SDK="$PS4_PAYLOAD_SDK"
              ;;
            ps5)
              make clean payload-ps5 payload-ps5-lib \
                MEMDBG_VERSION="${MEMDBG_RELEASE_VERSION}" \
                PS5_PAYLOAD_SDK="$PS5_PAYLOAD_SDK"
              ;;
            *)
              echo "Unknown build kind: ${{ matrix.kind }}" >&2
              exit 1
              ;;
          esac

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          case "${{ matrix.kind }}" in
            host)
              pkg="MemDBG-host-${{ matrix.platform }}"
              mkdir -p "dist/$pkg"
              cp build/MemDBG-host "dist/$pkg/MemDBG-host"
              chmod +x "dist/$pkg/MemDBG-host"
              cat > "dist/$pkg/BUILD_INFO.txt" <<EOF
          project=MemDBG
          version=${MEMDBG_RELEASE_VERSION}
          component=host
          platform=${{ matrix.platform }}
          ref=${{ github.ref_name }}
          sha=${{ github.sha }}
          EOF
              tar -C dist -czf "dist/$pkg.tar.gz" "$pkg"
              rm -rf "dist/$pkg"
              ;;
            frontend)
              pkg="MemDBG-frontend-${{ matrix.platform }}"

              if [ "${{ matrix.platform }}" = "macos" ]; then
                app_bundle=$(find build/frontend -type d -name 'MemDBG.app' -print -quit)
                if [ -z "$app_bundle" ]; then
                  echo "MemDBG.app bundle not found" >&2
                  find build/frontend -maxdepth 6 -print | sort
                  exit 1
                fi

                mkdir -p "dist/$pkg"
                cp -R "$app_bundle" "dist/$pkg/MemDBG.app"
                chmod +x "dist/$pkg/MemDBG.app/Contents/MacOS/"*
                cat > "dist/$pkg/MemDBG.app/Contents/Resources/BUILD_INFO.txt" <<EOF
          project=MemDBG
          version=${MEMDBG_RELEASE_VERSION}
          component=frontend
          platform=${{ matrix.platform }}
          ref=${{ github.ref_name }}
          sha=${{ github.sha }}
          EOF
                (cd "dist/$pkg" && ditto -c -k --sequesterRsrc --keepParent "MemDBG.app" "../$pkg.app.zip")
                ln -s /Applications "dist/$pkg/Applications"
                hdiutil create \
                  -volname "MemDBG ${MEMDBG_RELEASE_VERSION}" \
                  -srcfolder "dist/$pkg" \
                  -ov \
                  -format UDZO \
                  "dist/$pkg.dmg"
                rm -f "dist/$pkg/Applications"
                rm -rf "dist/$pkg"
              else
                mkdir -p "dist/$pkg/assets"
                frontend_bin=$(find build/frontend -type f \( -name 'memdbg_frontend' -o -name 'memdbg_frontend.exe' \) | head -n 1)
                probe_bin=$(find build/frontend -type f \( -name 'memdbg_probe' -o -name 'memdbg_probe.exe' \) | head -n 1)
                if [ -z "$frontend_bin" ] || [ -z "$probe_bin" ]; then
                  echo "Frontend binaries not found" >&2
                  find build/frontend -maxdepth 4 -type f | sort
                  exit 1
                fi
                cp "$frontend_bin" "dist/$pkg/"
                cp "$probe_bin" "dist/$pkg/"
                chmod +x "dist/$pkg/$(basename "$frontend_bin")" "dist/$pkg/$(basename "$probe_bin")"
                cp assets/app-icon.png "dist/$pkg/assets/app-icon.png"
                plugin_repo="$(dirname "$frontend_bin")/plugin-repository"
                if [ -d "$plugin_repo" ]; then
                  cp -R "$plugin_repo" "dist/$pkg/plugin-repository"
                elif [ -d plugin-repository ]; then
                  cp -R plugin-repository "dist/$pkg/plugin-repository"
                fi
                if [ "${{ matrix.platform }}" = "windows" ]; then
                  cp assets/app-icon.ico "dist/$pkg/assets/app-icon.ico"
                fi
                if [ "${{ matrix.platform }}" = "linux" ]; then
                  mkdir -p "dist/$pkg/share/applications" "dist/$pkg/share/icons/hicolor/1024x1024/apps"
                  cp assets/app-icon.png "dist/$pkg/share/icons/hicolor/1024x1024/apps/app-icon.png"
                  if [ -f "$(dirname "$frontend_bin")/MemDBG.desktop" ]; then
                    cp "$(dirname "$frontend_bin")/MemDBG.desktop" "dist/$pkg/share/applications/MemDBG.desktop"
                  else
                    cat > "dist/$pkg/share/applications/MemDBG.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=MemDBG
          Comment=Native memory debugger frontend
          Exec=memdbg_frontend
          Icon=app-icon
          Terminal=false
          Categories=Development;Debugger;
          EOF
                  fi
                fi
                cat > "dist/$pkg/BUILD_INFO.txt" <<EOF
          project=MemDBG
          version=${MEMDBG_RELEASE_VERSION}
          component=frontend
          platform=${{ matrix.platform }}
          ref=${{ github.ref_name }}
          sha=${{ github.sha }}
          EOF
                if [ "${{ matrix.platform }}" = "windows" ]; then
                  python3 -c "import shutil; shutil.make_archive('dist/$pkg', 'zip', 'dist', '$pkg')"
                else
                  tar -C dist -czf "dist/$pkg.tar.gz" "$pkg"
                fi
                rm -rf "dist/$pkg"
              fi
              ;;
            ps4)
              cp build/ps4/MemDBG-ps4.elf dist/MemDBG-ps4.elf
              cp build/ps4/libmemdbg.a dist/libmemdbg-ps4.a
              ;;
            ps5)
              cp build/ps5/MemDBG-ps5.elf dist/MemDBG-ps5.elf
              cp build/ps5/libmemdbg.a dist/libmemdbg-ps5.a
              ;;
          esac

          ls -lh dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  mobile-ios:
    name: Mobile iOS/iPadOS IPA
    needs: preflight
    if: needs.preflight.outputs.should_run == 'true'
    runs-on: macos-latest
    env:
      MEMDBG_RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect iOS project
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [ -f mobile/ios/CMakeLists.txt ]; then
            echo "enabled=cmake" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=none" >> "$GITHUB_OUTPUT"
            echo "iOS project not present yet; see mobile/ios/README.md"
          fi

      - name: Resolve build version
        if: steps.detect.outputs.enabled != 'none'
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "${MEMDBG_RELEASE_VERSION}" > VERSION

      - name: Setup ccache (iOS)
        if: steps.detect.outputs.enabled != 'none'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: macos-ios-ccache-${{ github.sha }}
          restore-keys: macos-ios-ccache-
          max-size: 400M

      - name: Cache iOS FetchContent dependencies
        if: steps.detect.outputs.enabled != 'none'
        uses: actions/cache@v4
        with:
          path: build/ios/_deps
          key: macos-ios-deps-${{ hashFiles('mobile/ios/CMakeLists.txt') }}
          restore-keys: macos-ios-deps-

      - name: Generate Xcode project
        if: steps.detect.outputs.enabled != 'none'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/ios
          # Xcode generator is required for iOS (code signing, storyboard
          # compilation); Ninja cannot replace it.  ccache is enabled via
          # the compiler-launcher flags below (also exported by ccache-action).
          cmake -S mobile/ios -B build/ios -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DMEMDBG_RELEASE_VERSION="${MEMDBG_RELEASE_VERSION}"

      - name: Build unsigned IPA
        if: steps.detect.outputs.enabled != 'none'
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project build/ios/memdbg_mobile.xcodeproj \
            -scheme MemDBGMobile \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios/derived \
            CODE_SIGNING_ALLOWED=NO \
            build
          # The POST_BUILD step in CMakeLists.txt already packages the .ipa.
          ipa_file=$(find build/ios -maxdepth 3 -type f -name 'MemDBG*.ipa' -print -quit)
          if [ ! -f "$ipa_file" ]; then
            # Fallback: look in derived data or Release-iphoneos.
            ipa_file=$(find build/ios/derived build/ios/Release-iphoneos -maxdepth 8 -type f -name 'MemDBG*.ipa' -print -quit 2>/dev/null || true)
          fi
          if [ -z "$ipa_file" ] || [ ! -f "$ipa_file" ]; then
            echo "MemDBG.ipa not found — falling back to manual wrapping" >&2
            app_path=$(find build/ios -maxdepth 8 -type d -name 'MemDBG.app' -print -quit)
            if [ ! -d "$app_path" ]; then
              echo "MemDBG.app also not found" >&2
              find build/ios -maxdepth 6 -print | sort
              exit 1
            fi
            mkdir -p build/ios/Payload
            rm -rf build/ios/Payload/MemDBG.app
            cp -R "$app_path" build/ios/Payload/MemDBG.app
            (cd build/ios && zip -qry "../../dist/MemDBG-mobile-ios.ipa" Payload)
          else
            mkdir -p dist
            cp "$ipa_file" dist/MemDBG-mobile-ios.ipa
          fi

      - name: Upload iOS artifact
        if: steps.detect.outputs.enabled != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: MemDBG-mobile-ios
          path: dist/*.ipa
          if-no-files-found: error
          retention-days: 14

  mobile-android:
    name: Mobile Android APK
    needs: preflight
    if: needs.preflight.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    env:
      MEMDBG_RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect Android project
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [ -x mobile/android/gradlew ]; then
            echo "enabled=1" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=0" >> "$GITHUB_OUTPUT"
            echo "Android Gradle project not present yet; see mobile/android/README.md"
          fi

      - name: Resolve build version
        if: steps.detect.outputs.enabled == '1'
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "${MEMDBG_RELEASE_VERSION}" > VERSION
          echo "MemDBG Android build version: ${MEMDBG_RELEASE_VERSION}"

      - name: Set up JDK
        if: steps.detect.outputs.enabled == '1'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        if: steps.detect.outputs.enabled == '1'
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        if: steps.detect.outputs.enabled == '1'
        shell: bash
        run: |
          set -euo pipefail
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT}}"
          yes | "${SDK}/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;26.1.10909125" "cmake;3.22.1" >/dev/null || true

      - name: Cache Gradle
        if: steps.detect.outputs.enabled == '1'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            mobile/android/app/.cxx
            mobile/android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/android/**/*.gradle.kts', 'mobile/android/**/*.gradle', 'mobile/android/gradle.properties', 'mobile/android/app/src/main/cpp/CMakeLists.txt') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Setup ccache (Android NDK)
        if: steps.detect.outputs.enabled == '1'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: linux-android-ccache-${{ github.sha }}
          restore-keys: linux-android-ccache-
          max-size: 400M

      - name: Build release APK
        if: steps.detect.outputs.enabled == '1'
        shell: bash
        env:
          NDK_CCACHE: ccache
        run: |
          set -euo pipefail
          cd mobile/android
          ./gradlew --no-daemon assembleRelease
          cd ../..
          mkdir -p dist
          apk_file=$(find mobile/android -type f \
            -path '*/build/outputs/apk/release/*.apk' -print -quit)
          if [ -z "${apk_file}" ]; then
            echo "Android release APK not found" >&2
            exit 1
          fi
          cp "${apk_file}" dist/MemDBG-mobile-android.apk

      - name: Upload Android artifact
        if: steps.detect.outputs.enabled == '1'
        uses: actions/upload-artifact@v4
        with:
          name: MemDBG-mobile-android
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    concurrency:
      group: release-publication-${{ needs.preflight.outputs.tag }}
      cancel-in-progress: false
    needs:
      - preflight
      - build
      - mobile-ios
      - mobile-android
    if: >-
      needs.preflight.outputs.should_run == 'true' &&
      needs.build.result == 'success' &&
      needs.mobile-ios.result == 'success' &&
      needs.mobile-android.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find release-artifacts -type f \( \
            -name '*.tar.gz' -o \
            -name '*.zip' -o \
            -name '*.dmg' -o \
            -name '*.ipa' -o \
            -name '*.apk' -o \
            -name '*.aab' -o \
            -name '*.AppImage' -o \
            -name '*.elf' -o \
            -name '*.a' \
          \) \
            -exec cp {} release-assets/ \;
          cd release-assets
          shopt -s nullglob
          assets=( *.tar.gz *.zip *.dmg *.ipa *.apk *.aab *.AppImage *.elf *.a )
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found" >&2
            exit 1
          fi
          sha256sum "${assets[@]}" > SHA256SUMS.txt
          ls -lh

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_DRAFT: ${{ inputs.draft }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          RELEASE_NIGHTLY: ${{ needs.preflight.outputs.nightly }}
          RELEASE_STABLE: ${{ needs.preflight.outputs.stable }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
          RELEASE_TITLE: ${{ needs.preflight.outputs.title }}
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          if [ "${RELEASE_NIGHTLY}" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            tag_sha="$(git ls-remote --refs origin "refs/tags/${tag}" | awk '{print $1}')"
            publication_args=(
              publication
              --expected-sha "${GITHUB_SHA}"
              --tag-sha "${tag_sha}"
            )
            if gh release view "${tag}" >/dev/null 2>&1; then
              publication_args+=(--release-exists)
            fi
            publication_action="$(
              python3 tools/resolve_release_identity.py "${publication_args[@]}"
            )"

            if [ "${publication_action}" = "create-tag-and-release" ]; then
              git tag "${tag}" "${GITHUB_SHA}"
              git push origin "refs/tags/${tag}"
            fi

            if [ "${publication_action}" = "verify" ]; then
              release_json="$(gh release view "${tag}" --json name,isDraft,isPrerelease,assets)"
              published_title="$(jq -r '.name' <<<"${release_json}")"
              published_draft="$(jq -r '.isDraft' <<<"${release_json}")"
              published_prerelease="$(jq -r '.isPrerelease' <<<"${release_json}")"
              if [ "${published_title}" != "${RELEASE_TITLE}" ] ||
                 [ "${published_draft}" != "false" ] ||
                 [ "${published_prerelease}" != "false" ]; then
                echo "Existing nightly release metadata does not match ${tag}" >&2
                exit 1
              fi

              mkdir -p published-nightly
              gh release download "${tag}" --dir published-nightly
              (
                cd published-nightly
                sha256sum -c SHA256SUMS.txt
                sed -E 's/^[0-9a-fA-F]{64} [ *]//' SHA256SUMS.txt |
                  sort > manifest-assets.txt
                find . -maxdepth 1 -type f ! -name SHA256SUMS.txt \
                  ! -name manifest-assets.txt -printf '%f\n' |
                  sort > downloaded-assets.txt
                diff -u manifest-assets.txt downloaded-assets.txt
              )
              find release-assets -maxdepth 1 -type f -printf '%f\n' |
                sort > expected-assets.txt
              jq -r '.assets[].name' <<<"${release_json}" |
                sort > published-assets.txt
              diff -u expected-assets.txt published-assets.txt
              echo "Nightly ${tag} is already published and its stored assets verify."
              exit 0
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              git tag "${tag}" "${GITHUB_SHA}"
              git push origin "refs/tags/${tag}"
            fi
          fi

          if [ "${RELEASE_NIGHTLY}" = "true" ]; then
            run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            commit_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
            notes=$(printf '%s\n\n%s\n\n%s\n%s\n\n%s\n' \
              'Automated historical nightly built from the latest `main` branch.' \
              'This immutable snapshot becomes GitHub Latest when first published. A newer stable official release can subsequently take the Latest badge.' \
              "- Commit: [${GITHUB_SHA:0:7}](${commit_url})" \
              "- Workflow run: [${GITHUB_RUN_ID}](${run_url})" \
              'Please report regressions in the [issue tracker](https://github.com/seregonwar/MemDBG/issues/new/choose). Pull requests are welcome.')
            flags=(--title "${RELEASE_TITLE}" --notes "${notes}" --latest --verify-tag)
          else
            flags=(--title "${RELEASE_TITLE}" --generate-notes)
            if [ "${INPUT_DRAFT:-false}" = "true" ]; then
              flags+=(--draft --latest=false)
            elif [ "${INPUT_PRERELEASE:-false}" = "true" ]; then
              flags+=(--prerelease --latest=false)
            elif [ "${RELEASE_STABLE}" = "true" ]; then
              flags+=(--latest)
            else
              flags+=(--latest=false)
            fi
          fi

          if [ "${RELEASE_NIGHTLY}" = "true" ]; then
            gh release create "${tag}" release-assets/* "${flags[@]}"
          elif gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" release-assets/* --clobber
          else
            gh release create "${tag}" release-assets/* "${flags[@]}"
          fi
