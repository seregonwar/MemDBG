name: Translation or localization
description: Report missing, broken, or incomplete frontend localization.
title: "[i18n]: "
labels: ["localization", "needs-triage"]
body:
  - type: dropdown
    id: language
    attributes:
      label: Language
      options:
        - English (en)
        - Spanish (es)
        - Italian (it)
        - French (fr)
        - Portuguese (pt)
        - German (de)
        - Japanese (ja)
        - Russian (ru)
        - New language
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: Localization issue
      description: Describe missing keys, incorrect wording, stale manifest data, broken formatting, or font/glyph problems.
      placeholder: "Screen, key, current text, expected text"
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Affected files or keys
      placeholder: |
        frontend/locales/it.json
        key.path.example

  - type: textarea
    id: verification
    attributes:
      label: Verification
      value: |
        - [ ] `make check-locales`
        - [ ] `python3 tools/generate_locale_manifest.py`
        - [ ] Frontend language switch checked manually
